<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>MyTime</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Crect width='36' height='36' rx='9' fill='%236366F1'/%3E%3Ccircle cx='18' cy='18' r='10' stroke='rgba(255,255,255,0.6)' stroke-width='1.5' fill='none'/%3E%3Cline x1='18' y1='18' x2='18' y2='9' stroke='white' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='18' y1='18' x2='25' y2='18' stroke='white' stroke-width='2.5' stroke-linecap='round'/%3E%3Ccircle cx='18' cy='18' r='2' fill='white'/%3E%3C/svg%3E">
</head>
<body>
  <div class="header">
    <div class="header-brand">
      <div class="popup-logo">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="7.5" stroke="rgba(255,255,255,0.65)" stroke-width="1.2"/>
          <line x1="10" y1="10" x2="10" y2="4" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="10" y1="10" x2="14.5" y2="10" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="10" cy="10" r="1.3" fill="white"/>
        </svg>
      </div>
      <div class="title">MyTime</div>
    </div>
    <div class="date" id="date"></div>
  </div>

  <div class="tab-bar">
    <button class="tab active" data-tab="data">今日数据</button>
    <button class="tab" data-tab="report">
      日报
      <span class="tab-dot" id="tabDot" style="display:none"></span>
    </button>
  </div>

  <!-- View: today data -->
  <div class="view" id="view-data">
    <div class="total">
      <span class="total-label">今日总计</span>
      <span class="total-time" id="totalTime">—</span>
    </div>
    <div class="categories" id="categories">
      <div class="placeholder">加载中…</div>
    </div>
  </div>

  <!-- View: daily report -->
  <div class="view hidden" id="view-report">
    <div class="report-header" id="reportDateLabel"></div>
    <div class="report-body" id="reportBody">
      <div class="placeholder">今日日报尚未生成，将于 23:00 自动生成</div>
    </div>
    <div class="report-nav">
      <button class="btn-prev" id="btnPrevReport">← 查看昨日日报</button>
    </div>
  </div>

  <div class="footer">
    <button class="btn-dashboard" id="openDashboard">查看完整数据 →</button>
  </div>

  <script src="../categories.js"></script>
  <script src="popup.js"></script>
</body>
</html>
