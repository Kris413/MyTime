<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTime</title>
  <link rel="stylesheet" href="dashboard.css">
  <!-- SVG favicon using the brand clock mark -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Crect width='36' height='36' rx='9' fill='%236366F1'/%3E%3Ccircle cx='18' cy='18' r='10' stroke='rgba(255,255,255,0.6)' stroke-width='1.5' fill='none'/%3E%3Cline x1='18' y1='18' x2='18' y2='9' stroke='white' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='18' y1='18' x2='25' y2='18' stroke='white' stroke-width='2.5' stroke-linecap='round'/%3E%3Ccircle cx='18' cy='18' r='2' fill='white'/%3E%3C/svg%3E">
</head>
<body>
  <header class="header">
    <div class="logo">
      <!-- Clock mark SVG logo -->
      <div class="logo-icon">
        <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="13" cy="13" r="10" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
          <line x1="13" y1="13" x2="13" y2="5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="13" y1="13" x2="19" y2="13" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="13" cy="13" r="1.8" fill="white"/>
        </svg>
      </div>
      <span class="logo-name">MyTime</span>
    </div>
    <button class="btn-settings" id="openSettings">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="10" cy="10" r="2.5"/>
        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42"/>
      </svg>
      设置
    </button>
  </header>

  <main class="main">

    <div class="controls">
      <div class="period-tabs">
        <button class="period-btn active" data-period="today">今天</button>
        <button class="period-btn" data-period="week">本周</button>
        <button class="period-btn" data-period="month">本月</button>
        <button class="period-btn" data-period="year">今年</button>
        <!-- cal-wrap anchors the panel below the 日历 button -->
        <div class="cal-wrap" id="calWrap">
          <button class="period-btn" data-period="custom">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="12" height="11" rx="2"/><path d="M5 1v4M11 1v4M2 7h12"/>
            </svg>
            <span id="calBtnLabel">日历</span>
          </button>
          <div class="cal-panel" id="calPanel">
            <div class="cal-head">
              <button class="cal-nav" id="calPrev" aria-label="上月">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 10L4 6l4-4"/></svg>
              </button>
              <span class="cal-title" id="calTitle"></span>
              <button class="cal-nav" id="calNext" aria-label="下月">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10l4-4-4-4"/></svg>
              </button>
            </div>
            <div class="cal-weekdays">
              <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
            </div>
            <div class="cal-grid" id="calGrid"></div>
            <div class="cal-footer">
              <button class="cal-foot-btn" id="calClear">清除</button>
              <button class="cal-foot-btn cal-foot-today" id="calTodayBtn">今天</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="insight-card" id="insightCard" style="display:none">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;color:#f59e0b">
        <circle cx="10" cy="10" r="8"/><path d="M10 6v4l2.5 2.5"/>
      </svg>
      <div class="insight-text" id="insightText"></div>
    </div>

    <div class="layout-grid">

      <!-- Left column -->
      <div class="col-left">

        <section class="hero-card">
          <div class="hero-period" id="heroPeriod">今日总计</div>
          <div class="hero-time" id="totalTime">—</div>
          <div class="hero-divider"></div>
          <div class="hero-meta">
            <div class="hero-meta-item">
              <div class="hero-meta-value" id="totalCats">—</div>
              <div class="hero-meta-label">活跃类别</div>
            </div>
            <div class="hero-meta-sep"></div>
            <div class="hero-meta-item">
              <div class="hero-meta-value" id="totalSites">—</div>
              <div class="hero-meta-label">访问网站</div>
            </div>
            <div class="hero-meta-sep" id="overSep" style="display:none"></div>
            <div class="hero-meta-item" id="overItem" style="display:none">
              <div class="hero-meta-value warn" id="overCount">—</div>
              <div class="hero-meta-label">超出上限</div>
            </div>
          </div>
        </section>

        <section class="card heatmap-card">
          <div class="card-head">
            <div class="card-label">活跃时段</div>
          </div>
          <div id="heatmap"><div class="empty">暂无数据</div></div>
        </section>

        <section class="card">
          <div class="card-head">
            <div class="card-label">类别分布</div>
          </div>
          <div id="chart"><div class="empty">暂无数据</div></div>
        </section>

        <section class="card">
          <div class="card-head">
            <div class="card-label">网站详情</div>
          </div>
          <div id="sites"><div class="empty">暂无数据</div></div>
        </section>

      </div>

      <!-- Right column -->
      <div class="col-right">
        <section class="card ai-section">
          <div class="card-head">
            <div class="card-label">AI 分析</div>
            <div class="ai-btns">
              <button class="ai-btn" data-type="week">生成周报</button>
              <button class="ai-btn" data-type="month">生成月报</button>
            </div>
          </div>
          <div class="ai-result" id="aiResult">
            <div class="ai-empty">选择周报或月报<br>生成 AI 分析</div>
          </div>
        </section>
      </div>

    </div>
  </main>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title">设置</div>
          <div class="modal-hint">类别上限与 AI 配置</div>
        </div>
        <button class="modal-close" id="closeSettings">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M1 1l12 12M13 1L1 13"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="api-section">
          <div class="api-label">Qwen API Key <span class="api-opt">（可选）</span></div>
          <div class="api-hint">填写后直连 API；留空则使用共享代理</div>
          <input type="password" class="api-input" id="apiKeyInput" placeholder="sk-...">
        </div>
        <div class="limits-title">每日时长上限</div>
        <div id="limitsList"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-save" id="saveLimits">保存</button>
      </div>
    </div>
  </div>

  <script src="../categories.js"></script>
  <script src="../ai.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
