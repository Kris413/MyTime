<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background: indigo rounded square -->
  <rect width="128" height="128" rx="28" fill="#6366F1"/>
  <!-- Clock face ring -->
  <circle cx="64" cy="64" r="38" stroke="rgba(255,255,255,0.55)" stroke-width="5" fill="none"/>
  <!-- Minute hand: pointing to 12 -->
  <line x1="64" y1="64" x2="64" y2="30" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Hour hand: pointing to 3 (shorter) -->
  <line x1="64" y1="64" x2="91" y2="64" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="7" fill="white"/>
</svg>
